id: io.github.mpvqc.mpvQC
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: mpvQC

finish-args:
  - --device=dri
  - --filesystem=xdg-desktop # open/save files on the Desktop
  - --filesystem=xdg-download # open downloaded video and subtitle files
  - --filesystem=xdg-videos # open video files
  - --filesystem=xdg-documents # save QC reports, subtitles, and backups
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:ro

#add-extensions:
#  org.freedesktop.Platform.codecs-extra:
#    directory: lib/codecs
#    version: '25.08'
#    add-ld-path: lib
#    autodelete: false

build-options:
  cflags: -O3 -march=x86-64-v2
  cxxflags: -O3 -march=x86-64-v2
  strip: true

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - io.github.mpvqc.mpvQC.pypi.yml

  # Rely on upstream project https://github.com/flathub/io.mpv.Mpv for building dependencies.
  # Most are just copied. ffmpeg and mpv are tweaked for mpvQC specifically
  - name: luajit
    no-autogen: true
    build-options:
      cflags: -O2 -fno-lto
      cxxflags: -O2 -fno-lto
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        disable-shallow-clone: true
        commit: 659a61693aa3b87661864ad0f12eee14c865cd7f
        x-checker-data:
          type: json
          url: https://api.github.com/repos/LuaJIT/LuaJIT/branches/v2.1
          commit-query: .commit.sha
          version-query: .commit.sha
          timestamp-query: .commit.commit.committer.date
      - type: shell
        commands:
          - sed -i 's|/usr/local|/app|' ./Makefile

  - name: uchardet
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_STATIC=0
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5 # TODO can be removed when updating to uchardet > 0.0.8
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz
        sha256: e97a60cfc00a1c147a674b097bb1422abd9fa78a2d9ce3f3fdcc2e78a34ac5f0
        x-checker-data:
          type: html
          url: https://www.freedesktop.org/software/uchardet/releases/
          version-pattern: uchardet-(\d\.\d+\.?\d*).tar.xz
          url-template: https://www.freedesktop.org/software/uchardet/releases/uchardet-$version.tar.xz

  - name: libass
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - --disable-static
      - --enable-asm
      - --enable-harfbuzz
      - --enable-fontconfig
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: 0.17.4
        commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
        x-checker-data:
          type: git
          tag-pattern: ^(\d\.\d{1,3}\.\d{1,2})$

  - name: zimg
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/sekrit-twc/zimg/tarball/release-3.0.6
        sha256: 15140e491c4ce9db5f02a038d8a1eb53e9151b55eeed06a2899425a6ebfef367
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sekrit-twc/zimg/releases/latest
          url-query: .tarball_url
          version-query: .tag_name | sub("^release-"; "")
          timestamp-query: .published_at

  - name: rubberband
    buildsystem: meson
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/breakfastquay/rubberband.git
        tag: v4.0.0
        commit: 1d95888bec3ae0a17c0c4af791810d5a63f6bc35
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: mujs
    buildsystem: autotools
    no-autogen: true
    make-args:
      - release
    make-install-args:
      - prefix=/app
      - install-shared
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://codeberg.org/ccxvii/mujs.git
        tag: 1.3.8
        commit: 307f18c4216420f2f56e22d8e7040baa39a6304a
        x-checker-data:
          type: json
          url: https://codeberg.org/api/v1/repos/ccxvii/mujs/tags
          tag-query: .[0].name
          version-query: $tag
          timestamp-query: .[0].commit.created
      # mujs 1.3.8 tries to curl these at build time; provide them as sources
      # so Make's file targets find them already present and skip the download.
      - type: file
        url: https://www.unicode.org/Public/16.0.0/ucd/UnicodeData.txt
        sha256: ff58e5823bd095166564a006e47d111130813dcf8bf234ef79fa51a870edb48f
      - type: file
        url: https://www.unicode.org/Public/16.0.0/ucd/SpecialCasing.txt
        sha256: 8d5de354eef79f2395a54c9c7dcebbaf3d30fc962d0f85611ea97aa973a0c451

  - name: ffmpeg
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/ffmpeg/examples
    config-opts:
      - --disable-debug
      - --disable-doc
      - --disable-libv4l2
      - --disable-programs
      - --disable-static
      - --enable-encoder=png
      - --enable-gnutls
      - --enable-gpl
      - --enable-libass
      - --enable-libdav1d
      - --enable-libdrm
      - --enable-libfreetype
      - --enable-libopus
      - --enable-libvorbis
      - --enable-libvpx
      - --enable-lto
      - --enable-shared
      - --enable-vaapi
      - --enable-version3
      - --enable-vulkan
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg.git
        tag: n8.1
        commit: 9047fa1b084f76b1b4d065af2d743df1b40dfb56
        x-checker-data:
          type: git
          tag-pattern: ^n([\d.]{3,7})$

  - name: vapoursynth
    config-opts:
      - --with-python-prefix=${FLATPAK_DEST}
    sources:
      - type: archive
        # without the dest-filename, flatpak-builder throws an "Unknown archive format" error
        dest-filename: vapoursynth.tar.gz
        url: https://api.github.com/repos/vapoursynth/vapoursynth/tarball/R73
        sha256: 9c02a68b29eb446b2d0b1be3d831420fdc2bd703aacccc468faef9f94e3bf85f
        x-checker-data:
          type: json
          url: https://api.github.com/repos/vapoursynth/vapoursynth/releases/latest
          version-query: .name
          timestamp-query: .published_at
          url-query: .tarball_url

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=enabled
      - -Dshaderc=enabled
      - -Ddemos=false
      - -Db_lto=true
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dbuild-date=false
      - -Dcdda=disabled
      - -Dcplayer=false # only need the library, not the player binary
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Dlibmpv=true # default since 0.41.0, kept for explicitness

      # Fail-fast for libraries we build ourselves (all default: auto)
      - -Djavascript=enabled # mujs
      - -Dlua=enabled # luajit
      - -Drubberband=enabled
      - -Duchardet=enabled
      - -Dvapoursynth=enabled
      - -Dzimg=enabled

      # Meson build options
      - -Db_lto=true
      - -Dwerror=false
      - -Dmanpage-build=disabled
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          is-main-source: true

  # https://github.com/flathub/io.qt.qtwebengine.BaseApp/tree/branch/6.7/krb5
  - name: krb5
    subdir: src
    cleanup:
      - /bin
      - /share/et
      - /share/examples
      - /share/man
    config-opts:
      - --localstatedir=/var/lib
      - --sbindir=${FLATPAK_DEST}/bin
      - --disable-rpath
      - --disable-static
    post-install:
      - install -Dm644 ../krb5.conf -t ${FLATPAK_DEST}/etc/
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.1.tar.gz
        sha256: 1a8832b8cad923ebbf1394f67e2efcf41e3a49f460285a66e35adec8fa0053af
        x-checker-data:
          type: html
          url: https://kerberos.org/dist/
          version-pattern: Kerberos V5 Release ([\d\.-]*) - current release
          url-template: https://kerberos.org/dist/krb5/$version0.$version1/krb5-$version.tar.gz
      - type: file
        path: krb5.conf

  - name: just
    buildsystem: simple
    build-commands:
      - install -Dm755 just /app/bin/just
    cleanup:
      - /bin/just
    sources:
      - type: archive
        url: https://github.com/casey/just/releases/download/1.47.1/just-1.47.1-x86_64-unknown-linux-musl.tar.gz
        sha256: 3cb931ae25860f261ee373f32ede3b772ac91f14f588e4071576d3ffcf1a16fd
        strip-components: 0

  - name: uv
    buildsystem: simple
    build-commands:
      - install -Dm755 uv /app/bin/uv
    cleanup:
      - /bin/uv
    sources:
      - type: archive
        url: https://github.com/astral-sh/uv/releases/download/0.10.12/uv-x86_64-unknown-linux-musl.tar.gz
        sha256: adccf40b5d1939a5e0093081ec2307ea24235adf7c2d96b122c561fa37711c46
        strip-components: 1

  - name: mpvQC
    buildsystem: simple
    build-options:
      env:
        MPVQC_COMPILE_QML: "true"
        UV_PYTHON: /usr/bin/python3
        UV_NO_PROJECT: "1"
    build-commands:
      # Build using the same recipe as the CI `build_linux` job.
      - just build-release

      # Install application files
      - mkdir -p /app/my-app
      - cp -r build/release/mpvqc /app/my-app
      - install -D build/release/main.py /app/my-app/main.py
      - install -D build/release/rc_project.py /app/my-app/rc_project.py

      # Install Flatpak integration files
      - install -Dm644 io.github.mpvqc.mpvQC.svg /app/share/icons/hicolor/scalable/apps/io.github.mpvqc.mpvQC.svg
      - install -Dm644 io.github.mpvqc.mpvQC.desktop /app/share/applications/io.github.mpvqc.mpvQC.desktop
      - install -Dm644 io.github.mpvqc.mpvQC.metainfo.xml -t /app/share/metainfo
      - install -Dm755 launch.sh /app/bin/launch.sh
      - ln -s /app/bin/launch.sh /app/bin/mpvQC

      # Install licenses shipped with the mpvQC source tree
      - mkdir -p ${FLATPAK_DEST}/share/licenses/$FLATPAK_ID/mpvQC
      - cp LICENSES/*.txt ${FLATPAK_DEST}/share/licenses/$FLATPAK_ID/mpvQC
    sources:
      # Build from local source (swap for type: git when preparing a release)
      - type: dir
        path: /home/elias/PycharmProjects/mpvQC
      # - type: git
      #   url: https://github.com/mpvqc/mpvQC.git
      #   tag: 0.9.0-beta4
      #   commit: <sha>

      # Flatpak-specific files not part of the mpvQC source tree
      - type: file
        path: launch.sh
      - type: file
        path: io.github.mpvqc.mpvQC.desktop
      - type: file
        path: io.github.mpvqc.mpvQC.metainfo.xml
      - type: file
        path: io.github.mpvqc.mpvQC.svg
